<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#070d1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0b429"/>
      <stop offset="100%" stop-color="#d4982a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.04" fill="#fff">
    <circle cx="100" cy="100" r="1.5"/><circle cx="200" cy="100" r="1.5"/><circle cx="300" cy="100" r="1.5"/><circle cx="400" cy="100" r="1.5"/><circle cx="500" cy="100" r="1.5"/><circle cx="600" cy="100" r="1.5"/><circle cx="700" cy="100" r="1.5"/><circle cx="800" cy="100" r="1.5"/><circle cx="900" cy="100" r="1.5"/><circle cx="1000" cy="100" r="1.5"/><circle cx="1100" cy="100" r="1.5"/>
    <circle cx="100" cy="200" r="1.5"/><circle cx="200" cy="200" r="1.5"/><circle cx="300" cy="200" r="1.5"/><circle cx="400" cy="200" r="1.5"/><circle cx="500" cy="200" r="1.5"/><circle cx="600" cy="200" r="1.5"/><circle cx="700" cy="200" r="1.5"/><circle cx="800" cy="200" r="1.5"/><circle cx="900" cy="200" r="1.5"/><circle cx="1000" cy="200" r="1.5"/><circle cx="1100" cy="200" r="1.5"/>
    <circle cx="100" cy="300" r="1.5"/><circle cx="200" cy="300" r="1.5"/><circle cx="300" cy="300" r="1.5"/><circle cx="400" cy="300" r="1.5"/><circle cx="500" cy="300" r="1.5"/><circle cx="600" cy="300" r="1.5"/><circle cx="700" cy="300" r="1.5"/><circle cx="800" cy="300" r="1.5"/><circle cx="900" cy="300" r="1.5"/><circle cx="1000" cy="300" r="1.5"/><circle cx="1100" cy="300" r="1.5"/>
    <circle cx="100" cy="400" r="1.5"/><circle cx="200" cy="400" r="1.5"/><circle cx="300" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/><circle cx="500" cy="400" r="1.5"/><circle cx="600" cy="400" r="1.5"/><circle cx="700" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/><circle cx="900" cy="400" r="1.5"/><circle cx="1000" cy="400" r="1.5"/><circle cx="1100" cy="400" r="1.5"/>
    <circle cx="100" cy="500" r="1.5"/><circle cx="200" cy="500" r="1.5"/><circle cx="300" cy="500" r="1.5"/><circle cx="400" cy="500" r="1.5"/><circle cx="500" cy="500" r="1.5"/><circle cx="600" cy="500" r="1.5"/><circle cx="700" cy="500" r="1.5"/><circle cx="800" cy="500" r="1.5"/><circle cx="900" cy="500" r="1.5"/><circle cx="1000" cy="500" r="1.5"/><circle cx="1100" cy="500" r="1.5"/>
  </g>

  <!-- House icon (SVG path, not emoji) -->
  <g transform="translate(556, 130)">
    <path d="M44 0L0 36h12v40h24v-24h16v24h24V36h12L44 0z" fill="url(#gold)"/>
  </g>

  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="700" fill="#e2e8f0" letter-spacing="1">Mortgage Calculator</text>

  <!-- Accent line -->
  <rect x="440" y="295" width="320" height="3" rx="1.5" fill="url(#gold)" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="600" y="345" text-anchor="middle" font-family="Inter, -apple-system, Arial, sans-serif" font-size="20" fill="#8899aa" letter-spacing="0.5">Annuity &amp; Differentiated  |  Early Payments  |  Charts  |  Export</text>

  <!-- Currency badges -->
  <g transform="translate(390, 400)">
    <rect x="0" y="0" width="70" height="32" rx="8" fill="#111d35" stroke="#1e2e4d" stroke-width="1"/>
    <text x="35" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#60a5fa">EUR</text>

    <rect x="90" y="0" width="70" height="32" rx="8" fill="#111d35" stroke="#1e2e4d" stroke-width="1"/>
    <text x="125" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#60a5fa">RUB</text>

    <rect x="180" y="0" width="70" height="32" rx="8" fill="#111d35" stroke="#1e2e4d" stroke-width="1"/>
    <text x="215" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#60a5fa">USD</text>

    <rect x="270" y="0" width="70" height="32" rx="8" fill="#111d35" stroke="#1e2e4d" stroke-width="1"/>
    <text x="305" y="21" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#60a5fa">RSD</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#gold)" opacity="0.6"/>
</svg>
